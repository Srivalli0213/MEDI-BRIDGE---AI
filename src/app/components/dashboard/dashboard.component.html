<div class="dashboard">
    <div class="dashboard-layout">
        <aside class="chat-sidebar">
            <app-chat [appointments]="appointments" #medibot></app-chat>
        </aside>

        <main class="dashboard-main">
            <div class="form-card dashboard-card" style="width:720px; max-width:92%;">
                <h2>Dashboard</h2>
                <p>Upcoming doctor appointments</p>

                <div style="margin-bottom:12px;">
                    <button class="btn btn-ghost" (click)="medibot.testBot()">Debug: Test MediBot</button>
                    <span class="text-muted" style="margin-left:8px;">(Triggers a sample bot reply — use to verify responses)</span>
                </div>

                <div class="appointments">
                    <div *ngIf="appointments?.length === 0" class="text-muted">No appointments scheduled.</div>
                    <div *ngFor="let a of appointments" class="appointment-row">
                        <div class="appointment-main">
                            <div class="appointment-patient">{{a.patient}}</div>
                            <div class="appointment-meta">with <strong>{{a.doctor}}</strong> • {{a.datetime}} • <span class="status">{{a.status}}</span></div>
                        </div>
                        <div class="appointment-actions">
                            <button class="btn btn-ghost" (click)="viewAppointment(a.id)">View</button>
                            <button class="btn btn-outline" (click)="cancelAppointment(a.id)" [disabled]="a.status === 'Cancelled'">Cancel</button>
                        </div>
                    </div>
                </div>

                <div class="form-row" style="margin-top:18px;">
                    <button class="btn btn-primary" (click)="goHome()">Back to home</button>
                </div>
            </div>
        </main>
    </div>
</div>
