<div class="dashboard">
    <div class="dashboard-layout">
        <aside class="chat-sidebar">
            <div class="chat-widget" aria-label="AI chat widget">
                <div class="robot-avatar" title="MediBot" (click)="focusChatInput()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="14" rx="3" fill="#efeefe" stroke="rgba(0,0,0,0.06)" />
                        <rect x="7" y="2" width="10" height="4" rx="1" fill="#efeefe" stroke="rgba(0,0,0,0.06)" />
                        <circle cx="9" cy="10" r="1.6" fill="#333" />
                        <circle cx="15" cy="10" r="1.6" fill="#333" />
                        <rect x="11" y="12.5" width="2" height="1.5" rx="0.4" fill="#333" />
                    </svg>
                </div>

                <div class="chat-body">
                    <div class="messages" role="log" aria-live="polite">
                        <div *ngFor="let m of messages" class="message" [ngClass]="{'message-bot': m.sender === 'bot', 'message-user': m.sender === 'user', 'message-draft': m.draft}">{{m.text}}</div>
                    </div>

                    <div class="chat-input-row">
                        <button class="btn mic-button" title="Record voice" (click)="toggleListening()" [class.listening]="listening" [attr.aria-pressed]="listening">🎤</button>
                        <input #chatInput type="text" placeholder="Ask MediBot..." aria-label="Chat input" (keydown.enter)="onSendChat(chatInput.value); chatInput.value='';" />
                        <button class="btn btn-primary" (click)="onSendChat(chatInput.value); chatInput.value='';">Send</button>
                        <button class="btn speak-button" title="Play latest bot reply" (click)="speakLastBot()">🔊</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="dashboard-main">
            <div class="form-card dashboard-card" style="width:720px; max-width:92%;">
                <h2>Dashboard</h2>
                <p>Upcoming doctor appointments</p>

                <div style="margin-bottom:12px;">
                    <button class="btn btn-ghost" (click)="testBot()">Debug: Test MediBot</button>
                    <span class="text-muted" style="margin-left:8px;">(Triggers a sample bot reply — use to verify responses)</span>
                </div>

                <div class="appointments">
                    <div *ngIf="appointments?.length === 0" class="text-muted">No appointments scheduled.</div>
                    <div *ngFor="let a of appointments" class="appointment-row">
                        <div class="appointment-main">
                            <div class="appointment-patient">{{a.patient}}</div>
                            <div class="appointment-meta">with <strong>{{a.doctor}}</strong> • {{a.datetime}} • <span class="status">{{a.status}}</span></div>
                        </div>
                        <div class="appointment-actions">
                            <button class="btn btn-ghost" (click)="viewAppointment(a.id)">View</button>
                            <button class="btn btn-outline" (click)="cancelAppointment(a.id)" [disabled]="a.status === 'Cancelled'">Cancel</button>
                        </div>
                    </div>
                </div>

                <div class="form-row" style="margin-top:18px;">
                    <button class="btn btn-primary" (click)="goHome()">Back to home</button>
                </div>
            </div>
        </main>
    </div>
</div>
