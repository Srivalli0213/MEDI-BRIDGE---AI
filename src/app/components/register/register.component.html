<section class="auth-page">
    <div class="form-card">
        <h2>Create an account</h2>
        <form (submit)="onRegister($event)" novalidate>
            <label for="reg-name">Full name</label>
            <input id="reg-name" name="name" type="text" required autocomplete="name" />

            <label for="reg-email">Email</label>
            <input id="reg-email" name="email" type="email" required autocomplete="email" />

            <label for="reg-password">Password</label>
            <input id="reg-password" name="password" type="password" required autocomplete="new-password" />

            <div class="form-row">
                <button class="btn btn-primary" type="submit">Create account</button>
                <button type="button" class="btn btn-ghost" (click)="goHome()">Back</button>
            </div>
        </form>
        <p class="text-muted">Already registered? <a (click)="handleLogin()" role="button">Sign in</a></p>
    </div>
</section>
